app = "ludo-game-server"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"

[[services]]
  internal_port = 3001
  protocol = "tcp"
  auto_stop_machines = false

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.ports]]
    port = 3001
    handlers = []

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
