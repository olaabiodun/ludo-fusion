<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Winnerson Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #07150f; color: #f5efd8; font-family: 'Inter', sans-serif; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(212,175,55,0.2); color: #f5efd8; }
        .btn-primary { background: #d4af37; border: none; color: #000; font-weight: bold; }
        .btn-outline-danger { border-color: #ff4d4d; color: #ff4d4d; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark px-4">
        <span class="navbar-brand mb-0 h1 text-gold">WINNERSON ADMIN</span>
        <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </nav>

    <div class="container mt-5">
        <div class="row">
            <div class="col-md-4">
                <div class="card p-3 mb-4">
                    <h5>Total Players</h5>
                    <h2 id="playerCount">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 mb-4">
                    <h5>Active Matches</h5>
                    <h2 id="matchCount">--</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card p-3 mb-4">
                    <h5>Total Revenue</h5>
                    <h2 id="revenueCount">₦ 0.00</h2>
                </div>
            </div>
        </div>

        <div class="card p-4 mt-4">
            <h4>Recent Activity</h4>
            <p class="text-muted">Supabase live data will appear here...</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://zuspbhabwlpxzmlxydgx.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_KzgmXSkpNiajIPe9KGQKMA_Ff1pX8uJ';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Auth Check
        const session = localStorage.getItem('admin_session');
        if (!session) {
            window.location.href = 'assets/login.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await supabaseClient.auth.signOut();
            localStorage.removeItem('admin_session');
            window.location.href = 'assets/login.html';
        });

        // Simple Stats Fetch
        async function fetchStats() {
            const { count: players } = await supabaseClient.from('profiles').select('*', { count: 'exact', head: true });
            document.getElementById('playerCount').innerText = players || 0;
            
            const { count: matches } = await supabaseClient.from('matches').select('*', { count: 'exact', head: true });
            document.getElementById('matchCount').innerText = matches || 0;
        }

        fetchStats();
    </script>
</body>
</html>
